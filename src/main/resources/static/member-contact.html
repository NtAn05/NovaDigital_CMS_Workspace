<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Member Contact Response Panel">
  <title>Member Contact Panel | NovaDigital</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { overflow-x: hidden; background: #f1f5f9; }
    .admin-layout { display: flex; min-height: 100vh; padding-top: 72px; }
    .admin-sidebar { width: 252px; min-height: calc(100vh - 72px); background: linear-gradient(175deg, #0f172a 0%, #1e1b4b 55%, #0f172a 100%); border-right: 1px solid rgba(255,255,255,0.06); padding: 1.75rem 0 2rem; position: fixed; top: 72px; left: 0; overflow-y: auto; z-index: 100; display: flex; flex-direction: column; }
    .sidebar-brand { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 1.25rem; }
    .sidebar-brand .brand-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.35); font-weight: 700; }
    .sidebar-section-title { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.13em; color: rgba(255,255,255,0.28); font-weight: 700; padding: 0 1.5rem; margin: 1.25rem 0 0.5rem; }
    .sidebar-nav { list-style: none; padding: 0 0.75rem; flex: 1; }
    .sidebar-nav li { margin-bottom: 2px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 0.85rem; border-radius: 10px; text-decoration: none; color: rgba(255,255,255,0.55); font-size: 0.88rem; font-weight: 500; transition: all 0.2s ease; cursor: pointer; user-select: none; }
    .sidebar-nav a:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.88); }
    .sidebar-nav a.active { background: linear-gradient(135deg, rgba(37,99,235,0.9), rgba(79,70,229,0.9)); color: #fff; box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
    .sidebar-nav a svg { width: 17px; height: 17px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sidebar-footer { padding: 1.25rem 1.5rem 0; border-top: 1px solid rgba(255,255,255,0.07); margin-top: auto; }
    .sidebar-footer a { display: flex; align-items: center; gap: 0.7rem; color: rgba(239,68,68,0.75); font-size: 0.88rem; font-weight: 600; text-decoration: none; padding: 0.65rem 0.85rem; border-radius: 10px; transition: all 0.2s; cursor: pointer; }
    .sidebar-footer a:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
    .sidebar-footer a svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
    .admin-main { margin-left: 252px; flex: 1; padding: 2.25rem 2.5rem; min-height: calc(100vh - 72px); }
    .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
    .panel-header h1 { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; color: var(--text-dark); line-height: 1.2; }
    .panel-header .panel-subtitle { color: var(--text-muted); font-size: 0.88rem; margin-top: 0.3rem; }
    .table-container { background: #fff; border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow-x: auto; margin-bottom: 1.5rem; }
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border-color); gap: 1rem; flex-wrap: wrap; }
    .table-toolbar h2 { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; color: var(--text-dark); }
    .table-search { display: flex; align-items: center; gap: 0.4rem; background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.45rem 0.8rem; }
    .table-search svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; flex-shrink: 0; }
    .table-search input { border: none; background: transparent; outline: none; font-size: 0.85rem; color: var(--text-dark); width: 170px; }
    .admin-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.88rem; }
    .admin-table th { background: #f8fafc; border-bottom: 1px solid var(--border-color); padding: 0.82rem 1.25rem; font-weight: 600; color: var(--text-dark); font-size: 0.77rem; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .admin-table td { padding: 0.95rem 1.25rem; border-bottom: 1px solid #f1f5f9; color: var(--text-muted); vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--card-bg-hover); }
    .text-dark-inline { color: var(--text-dark); font-weight: 600; }
    .status-badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 50px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .status-pending  { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
    .status-done  { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .btn-reply { padding: 0.32rem 0.75rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 0.28rem; font-family: var(--font-body); white-space: nowrap; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .btn-reply:hover { background: #dbeafe; }
    .crud-modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; visibility: hidden; transition: opacity 0.25s, visibility 0.25s; }
    .crud-modal-overlay.is-open { opacity: 1; visibility: visible; }
    .crud-modal { background: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 2rem 2.25rem 1.75rem; box-shadow: 0 25px 60px rgba(15,23,42,0.28); transform: translateY(22px) scale(0.97); transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s; opacity: 0; }
    .crud-modal-overlay.is-open .crud-modal { transform: none; opacity: 1; }
    .crud-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.6rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
    .crud-modal-header h3 { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 800; color: var(--text-dark); }
    .crud-modal-close { background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; line-height: 1; transition: all 0.2s; }
    .crud-modal-close:hover { background: #fef2f2; border-color: #fca5a5; color: #ef4444; transform: rotate(90deg); }
    .crud-modal .form-group { margin-bottom: 1.15rem; }
    .crud-modal .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-dark); }
    .crud-modal .form-group input, .crud-modal .form-group textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body); font-size: 0.95rem; transition: all 0.2s; }
    .crud-modal .form-group input:focus, .crud-modal .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
    .crud-modal .form-group textarea { min-height: 150px; resize: vertical; }
    .crud-modal-footer { display: flex; gap: 0.65rem; justify-content: flex-end; margin-top: 1.6rem; padding-top: 1.15rem; border-top: 1px solid var(--border-color); }
    .btn-cancel { padding: 0.65rem 1.3rem; border-radius: 50px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; border: 1px solid var(--border-color); background: #fff; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { background: var(--bg-light); }
    .btn-save { padding: 0.65rem 1.4rem; border-radius: 50px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; border: none; background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff; cursor: pointer; box-shadow: 0 4px 14px rgba(37,99,235,0.28); transition: all 0.2s; }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
    .crud-alert { margin-top: 0.85rem; padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.87rem; font-weight: 500; display: none; }
    .alert-success { display: block !important; background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .alert-error { display: block !important; background: #fef2f2; color: #ef4444; border: 1px solid #fca5a5; }
    .original-message { background: var(--bg-light); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .original-message h4 { margin: 0 0 0.5rem 0; font-size: 0.9rem; color: var(--text-muted); }
    .original-message p { margin: 0; color: var(--text-dark); white-space: pre-line; }
    @media (max-width: 992px) { .admin-sidebar { width: 220px; } .admin-main { margin-left: 220px; padding: 1.75rem; } }
    @media (max-width: 880px) { .admin-sidebar { display: none; } .admin-main { margin-left: 0; padding: 1.5rem; } }
    @media (max-width: 640px) { .panel-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; } .table-toolbar { flex-direction: column; align-items: flex-start; } .table-search { width: 100%; } .admin-table { font-size: 0.8rem; } .admin-table th, .admin-table td { padding: 0.6rem 0.8rem; } .crud-modal { padding: 1.25rem; max-width: 100%; } .crud-modal-footer { flex-direction: column-reverse; } .btn-cancel, .btn-save { width: 100%; } }
  </style>
</head>
<body class="dashboard-page">
  <header>
    <nav class="navbar">
      <a href="#" class="logo" id="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-2zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>NovaDigital</span>
      </a>
      <ul class="nav-links"></ul>
    </nav>
  </header>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <span class="brand-label">Member Portal</span>
      </div>
      <p class="sidebar-section-title">Tasks</p>
      <ul class="sidebar-nav">
        <li><a id="nav-contacts" class="active"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Client Requests</a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="#" id="member-logout-btn"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
      </div>
    </aside>
    <main class="admin-main">
      <div class="panel-header">
        <div>
          <h1>Client Requests</h1>
          <p class="panel-subtitle">View and respond to customer contact messages</p>
        </div>
      </div>
      <div class="table-container">
        <div class="table-toolbar">
          <h2>All Requests</h2>
          <div class="table-search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search requests..." oninput="filterMemberTable(this.value)">
          </div>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Client Info</th>
              <th>Subject</th>
              <th>Message</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="member-contacts-table-body">
            <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="reply-modal-overlay" class="crud-modal-overlay">
    <div class="crud-modal">
      <div class="crud-modal-header">
        <h3 id="reply-modal-title">Reply to Request</h3>
        <button class="crud-modal-close" onclick="closeReplyModal()">&times;</button>
      </div>
      <div id="reply-modal-body"></div>
      <div id="reply-alert" class="crud-alert alert-message"></div>
      <div class="crud-modal-footer">
        <button class="btn-cancel" onclick="closeReplyModal()">Cancel</button>
        <button class="btn-save" onclick="submitReply()">Send Reply</button>
      </div>
    </div>
  </div>
  <script src="/js/main.js"></script>
  <script>
    let currentContactId = null;
    function filterMemberTable(query) {
      const tbody = document.getElementById("member-contacts-table-body");
      if (!tbody) return;
      const q = query.toLowerCase();
      tbody.querySelectorAll("tr[data-searchable]").forEach(row => {
        const text = (row.getAttribute("data-searchable") || "").toLowerCase();
        row.style.display = text.includes(q) ? "" : "none";
      });
    }
    async function fetchMemberContacts() {
      const tableBody = document.getElementById("member-contacts-table-body");
      if (!tableBody) return;
      try {

        const token = sessionStorage.getItem("token") || "";
        const response = await fetch("/api/contacts", {
          headers: { "Authorization": "Bearer " + token }
        });
        if (!response.ok) throw new Error("Failed to fetch");
        const contacts = await response.json();
        tableBody.innerHTML = "";
        if (!contacts.length) {
          tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;">No requests yet.</td></tr>`;
          return;
        }
        contacts.forEach(contact => {
          const row = document.createElement("tr");
          const date = new Date(contact.createdAt).toLocaleDateString("en-US", {
            hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit", year: "numeric"
          });
          row.setAttribute("data-searchable", `${contact.name} ${contact.email} ${contact.title} ${contact.content}`);
          row.innerHTML = `
            <td><div class="text-dark-inline">${escapeHtml(contact.name)}</div><div style="font-size:0.85rem;color:var(--text-muted);">${escapeHtml(contact.email)}</div></td>
            <td class="text-dark-inline">${escapeHtml(contact.title)}</td>
            <td style="max-width:300px;white-space:pre-line;">${escapeHtml(contact.content)}</td>
            <td>${date}</td>
            <td><span class="status-badge ${contact.status === 'DONE' ? 'status-done' : 'status-pending'}">${escapeHtml(contact.status)}</span></td>
            <td><button class="btn-reply" onclick="openReplyModal(${contact.id})">Reply</button></td>
          `;
          tableBody.appendChild(row);
        });
      } catch (err) {
        console.error(err);
        tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:#ef4444;">Failed to load requests.</td></tr>`;
      }
    }
    function openReplyModal(contactId) {
      currentContactId = contactId;
      const overlay = document.getElementById("reply-modal-overlay");
      const body = document.getElementById("reply-modal-body");
      const alert = document.getElementById("reply-alert");
      if (alert) { alert.style.display = "none"; alert.textContent = ""; alert.className = "crud-alert alert-message"; }

      const token = sessionStorage.getItem("token") || "";
      fetch(`/api/contacts`, { headers: { "Authorization": "Bearer " + token } }).then(res => res.json()).then(contacts => {
        const contact = contacts.find(c => c.id === contactId);
        if (contact) {
          body.innerHTML = `
            <div class="original-message">
              <h4>Original Message from ${escapeHtml(contact.name)}</h4>
              <p><strong>Subject:</strong> ${escapeHtml(contact.title)}</p>
              <p><strong>Message:</strong><br>${escapeHtml(contact.content)}</p>
            </div>
            <div class="form-group">
              <label for="reply-message">Your Reply</label>
              <textarea id="reply-message" placeholder="Type your reply here..."></textarea>
            </div>
          `;
        }
        overlay.classList.add("is-open");
        document.body.style.overflow = "hidden";
      });
    }
    function closeReplyModal() {
      const overlay = document.getElementById("reply-modal-overlay");
      if (overlay) overlay.classList.remove("is-open");
      document.body.style.overflow = "";
      currentContactId = null;
    }
    async function submitReply() {
      const message = document.getElementById("reply-message").value.trim();
      const alert = document.getElementById("reply-alert");
      if (!message) {
        alert.textContent = "Please enter a reply message.";
        alert.className = "crud-alert alert-message alert-error";
        alert.style.display = "block";
        return;
      }
      try {
        alert.textContent = "Sending reply...";
        alert.className = "crud-alert alert-message";
        alert.style.display = "block";
        const token = sessionStorage.getItem("token") || "";

        const response = await fetch(`/api/contacts/${currentContactId}/reply`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        if (response.ok) {
          alert.textContent = "Reply sent successfully!";
          alert.className = "crud-alert alert-message alert-success";
          setTimeout(() => {
            closeReplyModal();
            fetchMemberContacts();
          }, 1000);
        } else {
          alert.textContent = data.message || "Failed to send reply.";
          alert.className = "crud-alert alert-message alert-error";
        }
      } catch (err) {
        console.error(err);
        alert.textContent = "Failed to send reply. Please try again.";
        alert.className = "crud-alert alert-message alert-error";
      }
    }
    document.addEventListener("DOMContentLoaded", () => {
      fetchMemberContacts();
      const logoutBtn = document.getElementById("member-logout-btn");
      if (logoutBtn) logoutBtn.addEventListener("click", e => { e.preventDefault(); logoutUser(); });
    });
  </script>
</body>
</html>
